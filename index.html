<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Mundial 2026 - ¡Modo Selección!</title>
    <!-- Configuración para que LinkedIn muestre bien el link -->
    <meta property="og:title" content="Fixture Interactivo - Mundial 2026" />
    <meta property="og:description" content="Elegí tu país, mira las estadísticas oficiales y agendá los partidos directamente en tu Google Calendar." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1518091043644-c1d4457512c6?w=1200" />
     <meta property="og:type" content="website" />>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo con los bastones de la camiseta argentina */
        .bg-camiseta {
            background-color: #ffffff;
            background-image: linear-gradient(90deg, transparent 50%, #e0f2fe 50%);
            background-size: 120px 100%;
        }
    </style>
</head>
<body class="bg-camiseta min-h-screen font-sans relative overflow-x-hidden backdrop-blur-[2px]">

    <!-- Pelotas flotantes decorativas (Efecto de fondo con onda) -->
    <div class="absolute top-10 -left-16 w-32 h-32 opacity-20 pointer-events-none blur-[1px] animate-bounce" style="animation-duration: 6s;">⚽</div>
    <div class="absolute top-1/3 -right-12 w-24 h-24 opacity-15 pointer-events-none blur-[2px] animate-pulse" style="animation-duration: 4s;">⚽</div>
    <div class="absolute bottom-10 left-10 w-28 h-28 opacity-20 pointer-events-none blur-[1px]">⚽</div>

    <div class="container mx-auto px-4 py-8 max-w-3xl relative z-10">
        <!-- Header épico -->
        <header class="text-center mb-10 bg-slate-900/90 p-6 rounded-3xl border-2 border-amber-400 shadow-xl backdrop-blur-md">
            <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 via-white to-amber-400 mb-2 tracking-tighter drop-shadow">
                ⭐ FIXTURE MUNDIAL 2026 ⭐
            </h1>
            <p class="text-sky-300 font-bold uppercase text-xs tracking-widest">Horarios de Argentina • Estadísticas H2H • Data FIFA</p>
        </header>

        <!-- Selector estilo pase de cancha -->
        <div class="bg-slate-900/95 p-6 rounded-3xl shadow-2xl mb-8 border-b-8 border-sky-400 border-x border-t border-slate-800">
            <label for="countrySelect" class="block text-xs font-black uppercase tracking-wider text-sky-400 mb-2">Seleccioná tu Selección:</label>
            <div class="relative">
                <select id="countrySelect" class="w-full bg-slate-950 border-2 border-slate-700 rounded-2xl px-4 py-3 text-white font-bold focus:outline-none focus:border-amber-400 transition appearance-none cursor-pointer">
                    <option value="">Cargando países...</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-sky-400">
                    🏆
                </div>
            </div>
        </div>

        <!-- Contenedor de Resultados -->
        <div id="resultWrapper" class="hidden space-y-6">
            <!-- Cuadros estadísticos dorados -->
            <div id="teamStats" class="grid grid-cols-3 gap-4 text-center"></div>
            
            <h2 class="text-2xl font-black text-slate-900 flex items-center gap-2 drop-shadow-sm bg-white/80 inline-block px-4 py-1 rounded-full border border-sky-200">
                ⚽ CRONOGRAMA DE PARTIDOS
            </h2>
            <div id="matchesList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const select = document.getElementById('countrySelect');
        const wrapper = document.getElementById('resultWrapper');
        const teamStatsDiv = document.getElementById('teamStats');
        const matchesListDiv = document.getElementById('matchesList');

        // URL de tu servidor en Render
        const API_BASE_URL = 'https://fixturemundial2026-wtjl.onrender.com';

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/api/teams`);
                const teams = await response.json();
                select.innerHTML = '<option value="">-- Elegir País del Mundo --</option>';
                teams.forEach(team => {
                    select.innerHTML += `<option value="${team.id}">${team.name}</option>`;
                });
            } catch (err) {
                select.innerHTML = '<option value="">Error al conectar con el servidor</option>';
            }
        });

        select.addEventListener('change', async (e) => {
            const teamId = e.target.value;
            if (!teamId) {
                wrapper.classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/fixture/${teamId}`);
                const data = await response.json();
                if (response.ok) renderDashboard(data);
            } catch (err) {
                console.error(err);
            }
        });

        function generateCalendarLink(seleccion, rival, fechaTxt, sede) {
            try {
                const partes = fechaTxt.split('-');
                const diaMesStr = partes[0].trim();
                const horaStr = partes[1].replace('HS', '').trim();

                const nroDia = diaMesStr.match(/\d+/)[0];
                const horaMin = horaStr.split(':');

                const año = 2026;
                const mes = 5; 

                const fechaLocal = new Date(año, mes, parseInt(nroDia), parseInt(horaMin[0]), parseInt(horaMin[1]));
                
                const startIso = fechaLocal.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                const fechaFinLocal = new Date(fechaLocal.getTime() + 2 * 60 * 60 * 1000);
                const endIso = fechaFinLocal.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';

                const titulo = encodeURIComponent(`🏆 ${seleccion} vs ${rival} | Mundial 2026`);
                const detalles = encodeURIComponent(`Partido de Fase de Grupos.\nHorario de Argentina.`);
                const lugar = encodeURIComponent(sede);

                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titulo}&dates=${startIso}/${endIso}&details=${detalles}&location=${lugar}`;
            } catch (error) {
                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(seleccion + ' vs ' + rival)}`;
            }
        }

        function renderDashboard(data) {
            wrapper.classList.remove('hidden');

            // Cuadros superiores estilo AFA Premium
            teamStatsDiv.innerHTML = `
                <div class="bg-slate-900 text-white p-4 rounded-2xl shadow-md border-b-4 border-amber-400">
                    <span class="block text-[10px] text-sky-400 uppercase font-black tracking-wider mb-1">Grupo</span>
                    <span class="text-xl md:text-2xl font-black">Grupo ${data.datos.grupo}</span>
                </div>
                <div class="bg-slate-900 text-white p-4 rounded-2xl shadow-md border-b-4 border-amber-400">
                    <span class="block text-[10px] text-sky-400 uppercase font-black tracking-wider mb-1">Ranking</span>
                    <span class="text-xl md:text-2xl font-black text-amber-400">#${data.datos.ranking_fifa}</span>
                </div>
                <div class="bg-amber-400 text-slate-950 p-4 rounded-2xl shadow-md border-b-4 border-amber-600">
                    <span class="block text-[10px] text-amber-900 uppercase font-black tracking-wider mb-1">Copas</span>
                    <span class="text-xl md:text-2xl font-black">⭐ ${data.datos.titulos_mundiales}</span>
                </div>
            `;

            matchesListDiv.innerHTML = '';
            if (data.partidos.length === 0) {
                matchesListDiv.innerHTML = '<p class="text-slate-600 italic text-center py-4 bg-white/80 rounded-2xl">Sin partidos registrados.</p>';
                return;
            }

            // Tarjetas de partidos con un contraste tremendo
            data.partidos.forEach(partido => {
                const googleCalendarUrl = generateCalendarLink(data.seleccion, partido.rival, partido.fecha_art, partido.lugar);

                matchesListDiv.innerHTML += `
                    <div class="bg-slate-900 text-white p-5 rounded-3xl shadow-xl border-l-8 border-sky-400 border-y border-r border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:scale-[1.01] transition-transform">
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-2">
                                <span class="text-[10px] bg-amber-400 text-slate-950 px-2 py-0.5 rounded-full font-black uppercase">Match ${partido.partido_numero}</span>
                                <span class="text-[10px] bg-slate-800 text-sky-300 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">${partido.jornada}</span>
                            </div>
                            <h3 class="text-xl font-black text-white mb-2 tracking-tight">vs ${partido.rival} <span class="text-xs font-bold text-amber-400">(#${partido.rival_ranking})</span></h3>
                            <p class="text-sm font-medium text-slate-300 mb-1 flex items-center gap-2">🕒 <span>${partido.fecha_art}</span></p>
                            <p class="text-xs text-slate-400 mb-4">📍 ${partido.lugar}</p>
                            
                            <!-- Botón Google Calendar -->
                            <a href="${googleCalendarUrl}" target="_blank" class="inline-flex items-center gap-2 text-xs bg-gradient-to-r from-sky-400 to-sky-500 hover:from-sky-500 hover:to-sky-600 text-slate-950 font-black rounded-xl px-4 py-2.5 shadow-lg shadow-sky-400/20 transition-all transform active:scale-95">
                                📅 AGENDAR PARTIDO
                            </a>
                        </div>
                        
                        <!-- Historial en una mini sub-tarjeta negra -->
                        <div class="bg-slate-950/80 p-4 rounded-2xl text-xs border border-slate-800 w-full md:w-auto min-w-[170px]">
                            <span class="block font-black text-sky-400 mb-2 text-center uppercase tracking-widest text-[9px]">Historial FIFA</span>
                            <div class="flex justify-around text-center gap-2">
                                <div><span class="block font-black text-emerald-400 text-lg">${partido.historial.ganados}</span><span class="text-[9px] text-slate-500 uppercase font-bold">Ganó</span></div>
                                <div><span class="block font-black text-slate-400 text-lg">${partido.historial.empatados}</span><span class="text-[9px] text-slate-500 uppercase font-bold">Empató</span></div>
                                <div><span class="block font-black text-rose-400 text-lg">${partido.historial.perdidos}</span><span class="text-[9px] text-slate-500 uppercase font-bold">Perdió</span></div>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
